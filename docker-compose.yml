services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  realtime:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVER_ADDR: ":8080"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      PRESENCE_TTL_SECONDS: "60"
      BROADCAST_MQ_TYPE: "redis"
      BROADCAST_MQ_ADDR: "redis:6379"
      BROADCAST_MQ_PASSWORD: ""
      BROADCAST_MQ_DB: "0"
      CORS_ALLOWED_ORIGINS: "*"
      JWT_SECRET: secret
      JWT_USER_CLAIM: sub
    depends_on:
      redis:
        condition: service_healthy

  # Standalone static site: serves playground/index.html only, separate from realtime API
  playground:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./playground:/usr/share/nginx/html:ro

volumes:
  redis-data:
